# SME reader: sales-engineering domain. Same image + source ConfigMap as the
# base lab-memory-mcp, scoped by env to the `salesengineer` Karakeep list tree.
#   COLLECTION = sme_salesengineer  (populated by the ingest worker's SME_ROUTES)
#   LIST_ID    = salesengineer root -> recall widens to {self + ancestors}
# A child list (e.g. salesengineer-manager) gets its own reader with its own
# LIST_ID and inherits this parent's knowledge via the ancestor filter.
#
# DNS prerequisite (mirrors mcp-memory): mcp-sme-salesengineer.ash4d.com A record
# -> 192.168.7.150 (shared Traefik VIP) before cert-manager can complete DNS-01.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-memory-mcp-sme-salesengineer
  namespace: lab-memory
  labels:
    app.kubernetes.io/name: lab-memory-mcp-sme-salesengineer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lab-memory-mcp-sme-salesengineer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lab-memory-mcp-sme-salesengineer
      annotations:
        checksum/src: "v1"
    spec:
      containers:
        - name: mcp
          image: registry.suse.com/bci/python:3.12
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install --quiet mcp pymilvus requests &&
              mkdir -p /src/lab_memory_mcp &&
              cp /app/retrieval.py /app/__init__.py /app/server.py /src/lab_memory_mcp/ &&
              cd /src && exec python3 -m lab_memory_mcp.server
          env:
            - name: PYTHONPATH
              value: /src
            - name: MCP_TRANSPORT
              value: streamable-http
            - name: MCP_HOST
              value: 0.0.0.0
            - name: MCP_PORT
              value: "8765"
            - name: PUBLIC_ADDR
              value: https://karakeep.ash4d.com
            # scope: sales-engineering SME domain
            - name: COLLECTION
              value: sme_salesengineer
            - name: LIST_ID
              value: ipnsyy1t55vakjtzkn25y1p0
            - name: KARAKEEP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lab-memory-ingest
                  key: karakeep-api-key
          ports:
            - containerPort: 8765
              name: mcp
          readinessProbe:
            tcpSocket: {port: mcp}
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket: {port: mcp}
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests: {memory: 256Mi, cpu: 100m}
            limits: {memory: 1Gi, cpu: "1"}
          volumeMounts:
            - name: src
              mountPath: /app
      volumes:
        - name: src
          configMap:
            name: lab-memory-mcp-src
---
apiVersion: v1
kind: Service
metadata:
  name: lab-memory-mcp-sme-salesengineer
  namespace: lab-memory
  labels:
    app.kubernetes.io/name: lab-memory-mcp-sme-salesengineer
spec:
  selector:
    app.kubernetes.io/name: lab-memory-mcp-sme-salesengineer
  ports:
    - name: mcp
      port: 8765
      targetPort: mcp
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lab-memory-mcp-sme-salesengineer
  namespace: lab-memory
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns
spec:
  ingressClassName: traefik
  tls:
    - hosts: [mcp-sme-salesengineer.ash4d.com]
      secretName: mcp-sme-salesengineer-ash4d-tls
  rules:
    - host: mcp-sme-salesengineer.ash4d.com
      http:
        paths:
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: lab-memory-mcp-sme-salesengineer
                port:
                  number: 8765
---
# Child reader: salesengineer-manager. Same collection (sme_salesengineer), but
# LIST_ID = the child list -> recall widens to {salesengineer-manager, salesengineer}
# so this reader inherits the parent's knowledge plus its own unique notes. The
# parent reader above is scoped to {salesengineer} only and never sees child data.
# DNS prerequisite: mcp-sme-salesengineer-manager.ash4d.com A record -> 192.168.7.150.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-memory-mcp-sme-salesengineer-manager
  namespace: lab-memory
  labels:
    app.kubernetes.io/name: lab-memory-mcp-sme-salesengineer-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lab-memory-mcp-sme-salesengineer-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lab-memory-mcp-sme-salesengineer-manager
      annotations:
        checksum/src: "v1"
    spec:
      containers:
        - name: mcp
          image: registry.suse.com/bci/python:3.12
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install --quiet mcp pymilvus requests &&
              mkdir -p /src/lab_memory_mcp &&
              cp /app/retrieval.py /app/__init__.py /app/server.py /src/lab_memory_mcp/ &&
              cd /src && exec python3 -m lab_memory_mcp.server
          env:
            - name: PYTHONPATH
              value: /src
            - name: MCP_TRANSPORT
              value: streamable-http
            - name: MCP_HOST
              value: 0.0.0.0
            - name: MCP_PORT
              value: "8765"
            - name: PUBLIC_ADDR
              value: https://karakeep.ash4d.com
            # same collection as the parent; scope narrows/widens via LIST_ID
            - name: COLLECTION
              value: sme_salesengineer
            - name: LIST_ID
              value: uxupn8cpjd78dezx14fzl4sc
            - name: KARAKEEP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lab-memory-ingest
                  key: karakeep-api-key
          ports:
            - containerPort: 8765
              name: mcp
          readinessProbe:
            tcpSocket: {port: mcp}
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket: {port: mcp}
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests: {memory: 256Mi, cpu: 100m}
            limits: {memory: 1Gi, cpu: "1"}
          volumeMounts:
            - name: src
              mountPath: /app
      volumes:
        - name: src
          configMap:
            name: lab-memory-mcp-src
---
