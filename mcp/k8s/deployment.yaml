# Interim deployment: BCI python + pip at start, source from ConfigMap
# (lab-memory-mcp-src). Proper image from mcp/Dockerfile via Harbor is the
# follow-up, mirroring ollama-code-mcp.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-memory-mcp
  namespace: lab-memory
  labels:
    app.kubernetes.io/name: lab-memory-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lab-memory-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lab-memory-mcp
      annotations:
        checksum/src: "v1"
    spec:
      containers:
        - name: mcp
          image: registry.suse.com/bci/python:3.12
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install --quiet mcp pymilvus requests &&
              mkdir -p /src/lab_memory_mcp &&
              cp /app/retrieval.py /app/__init__.py /app/server.py /src/lab_memory_mcp/ &&
              cd /src && exec python3 -m lab_memory_mcp.server
          env:
            - name: PYTHONPATH
              value: /src
            - name: MCP_TRANSPORT
              value: streamable-http
            - name: MCP_HOST
              value: 0.0.0.0
            - name: MCP_PORT
              value: "8765"
            - name: PUBLIC_ADDR
              value: https://karakeep.ash4d.com
            - name: KARAKEEP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lab-memory-ingest
                  key: karakeep-api-key
          ports:
            - containerPort: 8765
              name: mcp
          readinessProbe:
            tcpSocket: {port: mcp}
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket: {port: mcp}
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests: {memory: 256Mi, cpu: 100m}
            limits: {memory: 1Gi, cpu: "1"}
          volumeMounts:
            - name: src
              mountPath: /app
      volumes:
        - name: src
          configMap:
            name: lab-memory-mcp-src
